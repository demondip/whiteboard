<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whiteboard Pro | Smart Sidebar</title>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <style>
        :root {
            --accent: #6366f1;
            --glass: rgba(255, 255, 255, 0.85);
            --border: rgba(255, 255, 255, 0.5);
            --text: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            background: #f8fafc; 
            font-family: 'Inter', system-ui, sans-serif; 
        }

        /* --- Vertical Sidebar --- */
        #toolbar-container {
            position: fixed; left: 15px; top: 50%; transform: translateY(-50%);
            z-index: 3000; transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* Fully hide sidebar on collapse */
        #toolbar-container.minimized { left: -85px; }

        #toolbar {
            background: var(--glass);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; flex-direction: column; align-items: center;
            padding: 20px 10px; border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: 10px 0 40px rgba(0,0,0,0.08);
            gap: 15px;
        }

        .group { 
            display: flex; flex-direction: column; align-items: center; 
            gap: 12px; border-bottom: 1px solid rgba(0,0,0,0.05); 
            padding-bottom: 15px; width: 100%;
        }
        .group:last-child { border: none; padding-bottom: 0; }

        .tool {
            background: transparent; border: none; border-radius: 12px;
            width: 42px; height: 42px; cursor: pointer; color: var(--text);
            display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease;
        }
        .tool:hover { background: rgba(255,255,255,0.8); transform: translateX(3px); }
        .tool.active { background: var(--accent); color: white; box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }

        /* Sliders */
        input[type="range"] {
            -webkit-appearance: none; width: 45px; height: 4px;
            background: rgba(0,0,0,0.1); border-radius: 10px; cursor: pointer;
        }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 10px; height: 10px;
            background: var(--accent); border-radius: 50%; border: 2px solid white;
        }

        /* --- THE SMART COLLAPSE BUTTON --- */
       #collapse-btn {
    position: absolute; 
    right: -28px; /* Slightly further out */
    top: 50%; 
    transform: translateY(-50%);
    width: 28px; 
    height: 100px; /* Much taller for visibility */
    background: #ffffff;
    border: 1px solid #cbd5e1; 
    border-left: none;
    border-radius: 0 16px 16px 0; /* Curvier edge */
    cursor: pointer;
    display: flex; 
    align-items: center; 
    justify-content: center;
    color: #64748b; 
    backdrop-filter: blur(10px);
    box-shadow: 6px 0 15px rgba(0,0,0,0.1);
    transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

/* Make it expand even more on hover to show it's interactive */
#collapse-btn:hover { 
    color: var(--accent); 
    width: 35px; 
    right: -35px;
    background: #f1f5f9;
}

/* Optional: Adding a small visual "handle" line */
#collapse-btn::before {
    content: '';
    position: absolute;
    left: 4px;
    height: 30px;
    width: 2px;
    background: rgba(0,0,0,0.05);
    border-radius: 2px;
}

#collapse-icon {
    width: 20px;
    height: 20px;
    transition: transform 0.3s;
}

/* Adjust container transition to match the new width */
#toolbar-container.minimized { 
    left: -85px; 
}

        /* Nav Overlay (Bottom) */
        #nav-overlay {
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.4); backdrop-filter: blur(15px);
            padding: 5px 20px; border-radius: 100px;
            display: none; align-items: center; gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.5); z-index: 2000;
        }
        .page-info { font-size: 11px; font-weight: 800; color: #334155; }

        /* Canvas Setup */
        #viewport { position: relative; width: 100vw; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; touch-action: none; }
        #pdfCanvas { z-index: 1; }
        #pdfInk { z-index: 2; }
        #boardBg { z-index: 10; display: none; }
        #boardInk { z-index: 11; display: none; }
        #liveCanvas { z-index: 20; pointer-events: none; }
        #laserCanvas { z-index: 100; pointer-events: none; }

        .swatch-group { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .swatch { width: 18px; height: 18px; border-radius: 5px; cursor: pointer; border: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body>

    <div id="toolbar-container">
        <div id="toolbar">
            <div class="group">
                <button class="tool active" id="penBtn"><i data-lucide="pencil"></i></button>
                <input type="range" id="brushSize" min="1" max="25" value="3">
                <div class="swatch-group">
                    <div class="swatch" style="background:#ef4444" onclick="setInkColor('#ef4444')"></div>
                    <div class="swatch" style="background:#3b82f6" onclick="setInkColor('#3b82f6')"></div>
                    <div class="swatch" style="background:#10b981" onclick="setInkColor('#10b981')"></div>
                    <div class="swatch" style="background:#0f172a" onclick="setInkColor('#0f172a')"></div>
                </div>
            </div>
            
            <div class="group">
                <button class="tool" id="eraserBtn"><i data-lucide="eraser"></i></button>
                <input type="range" id="eraserSize" min="10" max="150" value="50">
                <button class="tool" id="laserBtn"><i data-lucide="zap"></i></button>
            </div>

            <div class="group">
                <button class="tool" id="blankBtn"><i data-lucide="monitor"></i></button>
                <button class="tool" id="patternBtn"><i data-lucide="grid"></i></button>
                <button class="tool" id="saveBtn"><i data-lucide="camera"></i></button>
                <button class="tool" id="importBtn"><i data-lucide="file-up"></i></button>
                <button class="tool" id="clearBtn"><i data-lucide="trash-2"></i></button>
            </div>
        </div>
        <div id="collapse-btn"><i data-lucide="chevron-left" id="collapse-icon"></i></div>
    </div>

    <div id="nav-overlay">
        <button class="tool" id="prevSlide"><i data-lucide="chevron-left"></i></button>
        <span id="pageCounter" class="page-info">BOARD 1</span>
        <button class="tool" id="nextSlide"><i data-lucide="chevron-right"></i></button>
    </div>

    <input type="file" id="fileInput" style="display:none" accept="application/pdf">
    <input type="color" id="colorPicker" style="display:none" value="#ef4444">

    <div id="viewport">
        <canvas id="pdfCanvas"></canvas>
        <canvas id="pdfInk"></canvas>
        <canvas id="boardBg"></canvas>
        <canvas id="boardInk"></canvas>
        <canvas id="liveCanvas"></canvas>
        <canvas id="laserCanvas"></canvas>
    </div>

<script>
    lucide.createIcons();
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    const canvases = {
        pdf: { bg: document.getElementById('pdfCanvas'), ink: document.getElementById('pdfInk') },
        board: { bg: document.getElementById('boardBg'), ink: document.getElementById('boardInk') },
        live: document.getElementById('liveCanvas'),
        laser: document.getElementById('laserCanvas')
    };
    const ctx = {
        pdfBg: canvases.pdf.bg.getContext('2d'),
        pdfInk: canvases.pdf.ink.getContext('2d'),
        boardBg: canvases.board.bg.getContext('2d'),
        boardInk: canvases.board.ink.getContext('2d'),
        live: canvases.live.getContext('2d'),
        laser: canvases.laser.getContext('2d')
    };

    let mode = 'pen', isDrawing = false, isBlankMode = false, pdfDoc = null, 
        pdfPageNum = 1, boardPageNum = 1, currentPattern = 'grid';
    let pdfInkHistory = {}, boardInkHistory = {}, currentStroke = [];

    function initCanvases() {
        const w = window.innerWidth, h = window.innerHeight;
        [canvases.pdf.bg, canvases.pdf.ink, canvases.board.bg, canvases.board.ink, canvases.live, canvases.laser].forEach(c => {
            c.width = w; c.height = h;
        });
        renderCurrentView();
    }

    function drawPattern(context) {
        const w = window.innerWidth, h = window.innerHeight;
        context.clearRect(0, 0, w, h);
        context.fillStyle = (currentPattern === 'lines') ? "#fffef0" : "#ffffff";
        context.fillRect(0, 0, w, h);
        if (currentPattern === 'grid') {
            context.strokeStyle = "rgba(0, 0, 0, 0.05)";
            for (let x = 0; x <= w; x += 40) { context.beginPath(); context.moveTo(x, 0); context.lineTo(x, h); context.stroke(); }
            for (let y = 0; y <= h; y += 40) { context.beginPath(); context.moveTo(0, y); context.lineTo(w, y); context.stroke(); }
        } else if (currentPattern === 'lines') {
            context.strokeStyle = "rgba(0, 0, 0, 0.06)";
            for (let y = 80; y <= h; y += 32) { context.beginPath(); context.moveTo(0, y); context.lineTo(w, y); context.stroke(); }
        }
    }

    async function renderCurrentView() {
        const inkCtx = isBlankMode ? ctx.boardInk : ctx.pdfInk;
        inkCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
        if (isBlankMode) {
            drawPattern(ctx.boardBg);
            if (boardInkHistory[boardPageNum]) {
                const img = new Image();
                img.onload = () => inkCtx.drawImage(img, 0, 0);
                img.src = boardInkHistory[boardPageNum];
            }
            document.getElementById('pageCounter').textContent = `BOARD ${boardPageNum}`;
        } else if (pdfDoc) {
            const page = await pdfDoc.getPage(pdfPageNum);
            const vp = page.getViewport({ scale: 1 });
            const scale = Math.max(window.innerWidth / vp.width, window.innerHeight / vp.height);
            ctx.pdfBg.fillStyle = "white"; ctx.pdfBg.fillRect(0, 0, window.innerWidth, window.innerHeight);
            await page.render({ canvasContext: ctx.pdfBg, viewport: page.getViewport({ scale: scale }) }).promise;
            if (pdfInkHistory[pdfPageNum]) {
                const img = new Image();
                img.onload = () => inkCtx.drawImage(img, 0, 0);
                img.src = pdfInkHistory[pdfPageNum];
            }
            document.getElementById('pageCounter').textContent = `SLIDE ${pdfPageNum} / ${pdfDoc.numPages}`;
        }
    }

    function startDraw(e) {
        if (mode === 'laser') return;
        isDrawing = true;
        const activeCtx = isBlankMode ? ctx.boardInk : ctx.pdfInk;
        activeCtx.globalCompositeOperation = (mode === 'eraser') ? 'destination-out' : 'source-over';
        currentStroke = [getPos(e)];
    }

    function draw(e) {
        const pos = getPos(e);
        if (mode === 'laser') {
            ctx.laser.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.laser.beginPath(); ctx.laser.arc(pos.x, pos.y, 8, 0, Math.PI * 2);
            ctx.laser.fillStyle = "#ef4444"; ctx.laser.shadowBlur = 15; ctx.laser.shadowColor = "red";
            ctx.laser.fill(); return;
        }
        if (!isDrawing) return;
        const activeCtx = isBlankMode ? ctx.boardInk : ctx.pdfInk;
        if (mode === 'pen') {
            currentStroke.push(pos);
            ctx.live.clearRect(0, 0, window.innerWidth, window.innerHeight);
            ctx.live.strokeStyle = document.getElementById('colorPicker').value;
            ctx.live.lineWidth = document.getElementById('brushSize').value;
            ctx.live.lineCap = 'round'; ctx.live.lineJoin = 'round';
            drawSmoothLine(currentStroke, ctx.live);
        } else {
            activeCtx.lineWidth = document.getElementById('eraserSize').value;
            activeCtx.lineCap = 'round'; activeCtx.beginPath();
            activeCtx.moveTo(currentStroke[currentStroke.length-1].x, currentStroke[currentStroke.length-1].y);
            activeCtx.lineTo(pos.x, pos.y); activeCtx.stroke();
            currentStroke.push(pos);
        }
    }

    function stopDraw() {
        if (!isDrawing) return;
        const activeCtx = isBlankMode ? ctx.boardInk : ctx.pdfInk;
        if (mode === 'pen') {
            activeCtx.strokeStyle = document.getElementById('colorPicker').value;
            activeCtx.lineWidth = document.getElementById('brushSize').value;
            activeCtx.lineCap = 'round'; activeCtx.lineJoin = 'round';
            drawSmoothLine(currentStroke, activeCtx);
        }
        saveCurrentState();
        ctx.live.clearRect(0, 0, window.innerWidth, window.innerHeight);
        isDrawing = false;
    }

    function drawSmoothLine(points, context) {
        if (points.length < 2) return;
        context.beginPath(); context.moveTo(points[0].x, points[0].y);
        for (let i = 1; i < points.length - 1; i++) {
            const midX = (points[i].x + points[i+1].x) / 2;
            const midY = (points[i].y + points[i+1].y) / 2;
            context.quadraticCurveTo(points[i].x, points[i].y, midX, midY);
        }
        context.stroke();
    }

    function saveCurrentState() {
        if (isBlankMode) boardInkHistory[boardPageNum] = canvases.board.ink.toDataURL();
        else if (pdfDoc) pdfInkHistory[pdfPageNum] = canvases.pdf.ink.toDataURL();
    }

    function getPos(e) {
        const x = e.clientX || (e.touches && e.touches[0].clientX);
        const y = e.clientY || (e.touches && e.touches[0].clientY);
        return { x, y };
    }

    // --- Interaction ---
    document.getElementById('blankBtn').onclick = function() {
        isBlankMode = !isBlankMode;
        this.classList.toggle('active', isBlankMode);
        canvases.board.bg.style.display = isBlankMode ? 'block' : 'none';
        canvases.board.ink.style.display = isBlankMode ? 'block' : 'none';
        document.getElementById('nav-overlay').style.display = 'flex';
        renderCurrentView();
    };

    document.getElementById('patternBtn').onclick = () => {
        const patterns = ['grid', 'lines', 'blank'];
        currentPattern = patterns[(patterns.indexOf(currentPattern) + 1) % patterns.length];
        if (isBlankMode) renderCurrentView();
    };

    document.getElementById('nextSlide').onclick = () => {
        saveCurrentState();
        if (isBlankMode) boardPageNum++;
        else if (pdfDoc && pdfPageNum < pdfDoc.numPages) pdfPageNum++;
        renderCurrentView();
    };

    document.getElementById('prevSlide').onclick = () => {
        saveCurrentState();
        if (isBlankMode && boardPageNum > 1) boardPageNum--;
        else if (!isBlankMode && pdfPageNum > 1) pdfPageNum--;
        renderCurrentView();
    };

    document.getElementById('importBtn').onclick = () => document.getElementById('fileInput').click();
    document.getElementById('fileInput').onchange = async (e) => {
        const file = e.target.files[0]; if (!file) return;
        const reader = new FileReader();
        reader.onload = async function() {
            pdfDoc = await pdfjsLib.getDocument(new Uint8Array(this.result)).promise;
            pdfPageNum = 1; pdfInkHistory = {}; isBlankMode = false;
            document.getElementById('nav-overlay').style.display = 'flex';
            renderCurrentView();
        };
        reader.readAsArrayBuffer(file);
    };

    document.getElementById('saveBtn').onclick = function() {
        const temp = document.createElement('canvas');
        temp.width = window.innerWidth; temp.height = window.innerHeight;
        const tCtx = temp.getContext('2d');
        if(isBlankMode) { tCtx.drawImage(canvases.board.bg, 0, 0); tCtx.drawImage(canvases.board.ink, 0, 0); }
        else { tCtx.drawImage(canvases.pdf.bg, 0, 0); tCtx.drawImage(canvases.pdf.ink, 0, 0); }
        const link = document.createElement('a');
        link.download = `Sketch-${Date.now()}.png`; link.href = temp.toDataURL(); link.click();
    };

    document.getElementById('clearBtn').onclick = () => {
        if(confirm("Clear slide?")) {
            const inkCtx = isBlankMode ? ctx.boardInk : ctx.pdfInk;
            inkCtx.clearRect(0,0,window.innerWidth, window.innerHeight);
            saveCurrentState();
        }
    };

    function setInkColor(c) { document.getElementById('colorPicker').value = c; setTool('pen', 'penBtn'); }
    function setTool(t, id) { 
        mode = t; 
        document.querySelectorAll('.tool').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }

    document.getElementById('penBtn').onclick = () => setTool('pen', 'penBtn');
    document.getElementById('eraserBtn').onclick = () => setTool('eraser', 'eraserBtn');
    document.getElementById('laserBtn').onclick = () => setTool('laser', 'laserBtn');
    
    // --- COLLAPSE BUTTON LOGIC ---
    document.getElementById('collapse-btn').onclick = function() {
        const container = document.getElementById('toolbar-container');
        const icon = document.getElementById('collapse-icon');
        container.classList.toggle('minimized');
        
        if (container.classList.contains('minimized')) {
            icon.setAttribute('data-lucide', 'chevron-right');
        } else {
            icon.setAttribute('data-lucide', 'chevron-left');
        }
        lucide.createIcons(); // Refresh icons
    };

    window.onresize = initCanvases;
    window.addEventListener('mousedown', startDraw);
    window.addEventListener('mousemove', draw);
    window.addEventListener('mouseup', stopDraw);
    window.addEventListener('touchstart', startDraw);
    window.addEventListener('touchmove', draw);
    window.addEventListener('touchend', stopDraw);
    initCanvases();
</script>
</body>
</html>
